# nginx.conf — Konfigurasi Nginx sebagai Load Balancer
#
# Nginx menerima semua request dari klien pada port 80.
# Request dengan prefix /api akan di-load balance ke api_gateways.
# Request lainnya diteruskan ke frontend server (React).

upstream api_gateways {
    server gw-1:8000;
    server gw-2:8000;
}

server {
    listen 80;
    server_name localhost;

    # Izinkan upload berkas hingga 10 MB
    client_max_body_size 10m;

    # Route untuk REST API
    location /api {
        proxy_pass http://api_gateways;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Route untuk Frontend React SPA
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
