# docker-compose.yml — Orkestrasi Seluruh Layanan Helpdesk Ticketing
#
# Arsitektur:
#   Nginx (LB) → API Gateway (x2) → Ticket Service (x3, Ring Election)
#                                  → RabbitMQ → Workers (Assignment, Notification)
#                                  → PostgreSQL
#
# Cara menjalankan:
#   docker compose up --build
#
# Akses:
#   - GUI / API:         http://localhost:80
#   - RabbitMQ Management: http://localhost:15672 (guest/guest)
#   - PostgreSQL:        localhost:5432 (helpdesk/helpdesk123)

services:

  # ============================================================
  # DATABASE — PostgreSQL untuk penyimpanan persisten
  # ============================================================
  postgres:
    image: postgres:15-alpine
    hostname: postgres
    environment:
      POSTGRES_DB: helpdesk_db
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk123
    ports:
      - "5432:5432"
    volumes:
      # Script init.sql dijalankan otomatis saat database pertama kali dibuat
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk -d helpdesk_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ============================================================
  # MESSAGE BROKER — RabbitMQ untuk alur kerja asinkron
  # ============================================================
  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # Management Web UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # TICKET SERVICE NODES — 3 Node dengan Ring-based Election
  # ============================================================
  # Ring Topology: ticket-1 → ticket-2 → ticket-3 → ticket-1

  ticket-1:
    build: ./ticket_service
    hostname: ticket-1
    command: python ticket_service.py
    environment:
      NODE_NAME: "ticket-1"
      NODE_ID: "1"
      ALL_NODES: "ticket-1:1,ticket-2:2,ticket-3:3"
      RABBIT_HOST: "rabbitmq"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "helpdesk_db"
      DB_USER: "helpdesk"
      DB_PASS: "helpdesk123"
    ports:
      - "9001:9000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ticket-2:
    build: ./ticket_service
    hostname: ticket-2
    command: python ticket_service.py
    environment:
      NODE_NAME: "ticket-2"
      NODE_ID: "2"
      ALL_NODES: "ticket-1:1,ticket-2:2,ticket-3:3"
      RABBIT_HOST: "rabbitmq"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "helpdesk_db"
      DB_USER: "helpdesk"
      DB_PASS: "helpdesk123"
    ports:
      - "9002:9000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ticket-3:
    build: ./ticket_service
    hostname: ticket-3
    command: python ticket_service.py
    environment:
      NODE_NAME: "ticket-3"
      NODE_ID: "3"
      ALL_NODES: "ticket-1:1,ticket-2:2,ticket-3:3"
      RABBIT_HOST: "rabbitmq"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "helpdesk_db"
      DB_USER: "helpdesk"
      DB_PASS: "helpdesk123"
    ports:
      - "9003:9000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ============================================================
  # ASYNC WORKERS — Konsumen RabbitMQ
  # ============================================================

  # Assignment Worker: auto-assign tiket ke agen
  assignment-worker:
    build: ./assignment_worker
    hostname: assignment-worker
    command: python assignment_worker.py
    environment:
      RABBIT_HOST: "rabbitmq"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "helpdesk_db"
      DB_USER: "helpdesk"
      DB_PASS: "helpdesk123"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Notification Worker: buat notifikasi dari event tiket
  notification-worker:
    build: ./notification_worker
    hostname: notification-worker
    command: python notification_worker.py
    environment:
      RABBIT_HOST: "rabbitmq"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "helpdesk_db"
      DB_USER: "helpdesk"
      DB_PASS: "helpdesk123"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ============================================================
  # API GATEWAY — 2 Instance untuk Load Balancing
  # ============================================================

  gw-1:
    build: ./api_gateway
    hostname: gw-1
    command: python api_gateway.py
    environment:
      GW_ID: "1"
      TICKET_NODES: "http://ticket-1:9000,http://ticket-2:9000,http://ticket-3:9000"
    depends_on:
      - ticket-1
      - ticket-2
      - ticket-3

  gw-2:
    build: ./api_gateway
    hostname: gw-2
    command: python api_gateway.py
    environment:
      GW_ID: "2"
      TICKET_NODES: "http://ticket-1:9000,http://ticket-2:9000,http://ticket-3:9000"
    depends_on:
      - ticket-1
      - ticket-2
      - ticket-3

  # ============================================================
  # FRONTEND — React SPA (Served via internal Nginx)
  # ============================================================
  frontend:
    build: ./frontend
    hostname: frontend
    depends_on:
      - gw-1
      - gw-2

  # ============================================================
  # LOAD BALANCER — Nginx Round-Robin
  # ============================================================
  nginx:
    image: nginx:alpine
    hostname: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gw-1
      - gw-2
      - frontend

# Volume untuk data PostgreSQL agar persisten antar restart
volumes:
  pgdata:
